###
# カスタムメッセージファイル。
#
# メッセージには http://minecraft.gamepedia.com/Formatting_codes のフォーマットコードを使用できます。コードの指定には '&' を使用してください。
# カスタムメッセージは必ずシングルクォートで囲んでください。
# 新しい更新により内容が変更される場合があり、古いバージョンでは情報が正しく表示されないことがあります。変更は changelog に記載されます。
###

