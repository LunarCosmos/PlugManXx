###
# 自定义消息文件。
#
# 消息可以包含 http://minecraft.gamepedia.com/Formatting_codes 上的格式代码，并且必须使用 '&' 字符表示。
# 请确保自定义消息使用单引号包裹。
# 新版本可能会更改这些内容，旧版本可能无法正确显示信息。更改会记录在 changelog 中。
###

prefix: '&7[&aPlugMan&7] '
