###
# Файл пользовательских сообщений.
#
# Сообщения могут содержать коды форматирования с http://minecraft.gamepedia.com/Formatting_codes и должны использовать символ '&'.
# Убедитесь, что пользовательские сообщения заключены в одинарные кавычки.
# В новых версиях это может измениться, и старые версии могут отображать информацию неправильно. Изменения будут указаны в changelog.
###

prefix: '&7[&aPlugMan&7] '
